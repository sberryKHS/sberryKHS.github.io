<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Bouncing Box</title>
	<script src="jquery.min.js"></script>
	<style>
		.box {
			width: 80px;
			height: 80px;
			background-image: url("images/platform.jpg");
			color: white;
      font-size: 300%;
			text-align: center;
			user-select: none;
			display: block;
			position: absolute;
			top: 250px;
			/* Change me! */
			left: 0px;
		}

		.board {
			background-image: url("images/castle.gif");
   	 	background-size: cover;
    	padding: 10px;
    	font-family: Arial, sans-serif;
			height: 100vh;
		}
	</style>
	<!-- 	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script> -->

</head>

<body class="board">
	<!-- HTML for the box -->
	<div class="box">?</div>

	<script>
		(function () {
			'use strict'
			/* global jQuery */

			//////////////////////////////////////////////////////////////////
			/////////////////// SETUP DO NOT DELETE //////////////////////////
			//////////////////////////////////////////////////////////////////

			var box = jQuery('.box');	// reference to the HTML .box element
			var board = jQuery('.board');	// reference to the HTML .board element
			var boardWidth = board.width();	// the maximum X-Coordinate of the screen
			var boardHeight = jQuery(window).height(); // the maximum Y-Coordinate of the screen

			// Every 50 milliseconds, call the update Function (see below)
			var interval = setInterval(update, 20);

			// Every time the box is clicked, call the handleBoxClick Function (see below)
			box.on('click', handleBoxClick);
			board.on('click',handleMissedClick);
			if (good === false) {
				box.off('click', handleBoxClick);
			}
			// moves the Box to a new position on the screen along the X-Axis
			function moveBoxTo(newPositionX, newPositionY) {
  			box.css("left", newPositionX);
 				box.css("top", newPositionY);
			}

			// changes the text displayed on the Box
			function changeBoxText(newText) {
				box.text(newText);
			}

			//////////////////////////////////////////////////////////////////
			/////////////////// YOUR CODE BELOW HERE /////////////////////////
			//////////////////////////////////////////////////////////////////

			// TODO 2 - Variable declarations 
			var positionX = 0; 
			var points = 0;
			var speed = 10;
			var speedY = 10;
			var positionY = 0;
			var ranNum = Math.random() * boardWidth;
			var ranYNum = Math.random() * boardHeight;
			var fails = 0;
			var colorStr = 'images/bluey.jpg';
			var colorStd = 'images/purplely.jpg';
			var good = true;
			var testy = 'images/platform.jpg';

			// Function that ends the game.

			function endGame() {
				clearInterval(interval);
				good = false
			}
			/* 
			This Function will be called 20 times/second. Each time it is called,
			it should move the Box to a new location. If the box drifts off the screen
			turn it around! 
			*/
			function update() {
				moveBoxTo(positionX, positionY);
				positionX += speed;
				positionY += speedY;
				if (positionX > boardWidth) {
					speed *= -1;
				}
				else if (positionX < 0) {
					speed *= -1;
				}
				
				else if (positionY > boardHeight) {
					speedY *= -1;
				}
				else if (positionY < 0) {
					speedY *= -1;
				}
				
				
				

			}

			/* 
			This Function will be called each time the box is clicked. Each time it is called,
			it should increase the points total, increase the speed, and move the box to
			the left side of the screen.
			*/
			function handleBoxClick() {
				positionX = ranNum;
				positionY = ranYNum;
				points += 1;
				fails -= points
				changeBoxText (points);
				if (points % 3 == 0) {
					speed = points + 10;
					speedY = points + 10;
				}
				if (points % 2 == 0) {
					box.css ("background-image", 'url("' + colorStr + '")');
					box.css("background-size", cover);
				} 
				else if (points % 3 === 0) {
					box.css ("background-image", 'url("' + testy + '")');
					box.css ("background-size", cover);
				} 
				else {
					box.css ("background-image", 'url("' + colorStd + '")');
					box.css ("background-size", cover);
				}
		
			}
			
			function handleMissedClick() {
				fails += 1;
				if (fails === 10) {
					endGame();
					alert ("You have to click the box, not the board. Refresh to try again.");
				}
			}





		})();
	</script>
</body>

</html>
